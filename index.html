<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChaoticTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    try {
      const theme = JSON.parse(localStorage.getItem("ct-theme")) || {};
      if (theme.bg) document.documentElement.style.setProperty("--bg", theme.bg);
      if (theme.accent) document.documentElement.style.setProperty("--accent", theme.accent);
      if (theme.bg) document.body.style.background = theme.bg;
      if (theme.mode === "light") document.body.classList.add("light");

      const prefs = JSON.parse(localStorage.getItem("ct-prefs")) || {};

      if (prefs.font === "small") {
        document.body.style.zoom = "0.85";
      } else if (prefs.font === "large") {
        document.body.style.zoom = "1.15";
      } else {
        document.body.style.zoom = "1";
      }

      const cardMin = prefs.card === "compact" ? "220px" : prefs.card === "large" ? "380px" : "300px";
      document.documentElement.style.setProperty("--card-min", cardMin);
      document.documentElement.setAttribute("data-card", prefs.card || "normal");

      if (prefs.layout === "list") {
        document.addEventListener("DOMContentLoaded", () => {
          const grid = document.getElementById("videoFeed");
          if (grid) grid.classList.add("list-layout");
        });
        const grid = document.getElementById("videoFeed");
        if (grid) grid.classList.add("list-layout");
      }

    } catch {}
  </script>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">ChaoticTube</span>
      </div>
      <div class="search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search videos…">
      </div>
      <a href="friends.html" id="friendsBtn" title="Friends">👥 Friends</a>
      <a href="halloffame.html" id="hallTopBtn" title="Hall of Fame">🏆 Hall of Fame</a>
      <a href="settings.html" id="settingsBtn" title="Settings">⚙️</a>
      <button id="themeToggleBtn" title="Customise theme" aria-label="Customise theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      </button>
    </div>
  </header>

  <!-- Theme Panel -->
  <div id="themePanel" content="theme-panel hidden">
    <div class="theme-panel-inner">
      <div class="theme-section">
        <span class="theme-label">Mode</span>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="dark">🌙 Dark</button>
          <button class="mode-btn" data-mode="light">☀️ Light</button>
        </div>
      </div>
      <div class="theme-section">
        <span class="theme-label">Background</span>
        <div class="swatch-row">
          <button class="swatch" data-color="#0f0f11" title="Void" style="background:#0f0f11"></button>
          <button class="swatch" data-color="#0d1117" title="Midnight" style="background:#0d1117"></button>
          <button class="swatch" data-color="#1a0a2e" title="Deep Purple" style="background:#1a0a2e"></button>
          <button class="swatch" data-color="#0a1628" title="Navy" style="background:#0a1628"></button>
          <button class="swatch" data-color="#0f1f0f" title="Forest" style="background:#0f1f0f"></button>
          <button class="swatch" data-color="#1f0a0a" title="Ember" style="background:#1f0a0a"></button>
          <button class="swatch" data-color="#f5f5f0" title="Paper" style="background:#f5f5f0"></button>
          <button class="swatch" data-color="#eef2ff" title="Lavender" style="background:#eef2ff"></button>
          <button class="swatch" data-color="#fff8f0" title="Warm" style="background:#fff8f0"></button>
          <label class="swatch swatch-custom" title="Custom colour">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <input type="color" id="customColorPicker" value="#0f0f11">
          </label>
        </div>
      </div>
      <div class="theme-section">
        <span class="theme-label">Accent</span>
        <div class="swatch-row">
          <button class="swatch accent-swatch active" data-accent="#7c6af7" title="Purple" style="background:#7c6af7"></button>
          <button class="swatch accent-swatch" data-accent="#3b82f6" title="Blue" style="background:#3b82f6"></button>
          <button class="swatch accent-swatch" data-accent="#10b981" title="Emerald" style="background:#10b981"></button>
          <button class="swatch accent-swatch" data-accent="#f59e0b" title="Amber" style="background:#f59e0b"></button>
          <button class="swatch accent-swatch" data-accent="#ef4444" title="Red" style="background:#ef4444"></button>
          <button class="swatch accent-swatch" data-accent="#ec4899" title="Pink" style="background:#ec4899"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Upload Panel -->
  <div class="upload-panel">
    <div class="upload-inner">
      <div class="upload-tabs">
        <div class="upload-left">
          <button class="upload-tab active" data-tab="file">📁 Upload File</button>
          <button class="upload-tab" data-tab="youtube">▶️ YouTube Link</button>
        </div>
      </div>

      <!-- File Upload Tab -->
      <div id="tabFile">
        <label class="upload-drop-zone" id="dropZone" for="videoInput">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p class="drop-label">Click to choose a video, or drag one here</p>
          <p class="drop-sub" id="fileNameDisplay">MP4, MOV, WebM</p>
          <input type="file" id="videoInput" accept="video/*" hidden>
        </label>
        <div class="upload-fields">
          <input type="text" id="titleInput" placeholder="Video title" maxlength="80">
          <button id="uploadBtn" disabled>
            <span id="uploadBtnText">Upload</span>
            <svg id="uploadSpinner" class="spinner hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </button>
        </div>
        <p class="compress-hint">📦 Video too large? <a href="https://clideo.com/compress-video" target="_blank" class="compress-link">Compress it free here</a> — no login needed!</p>
      </div>

      <!-- YouTube Tab -->
      <div id="tabYoutube" class="hidden">
        <div class="youtube-fields">
          <input type="text" id="youtubeUrl" placeholder="Paste YouTube URL (e.g. https://youtube.com/watch?v=...)">
          <div class="upload-fields">
            <input type="text" id="youtubeTitleInput" placeholder="Video title" maxlength="80">
            <button id="youtubeBtn" disabled>
              <span id="youtubeBtnText">Add Video</span>
              <svg id="youtubeSpinner" class="spinner hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            </button>
          </div>
        </div>
      </div>

      <p id="status" class="status-msg"></p>
    </div>
  </div>

  <!-- Nominate Modal -->
  <div id="nominateModal" class="modal-overlay hidden">
    <div class="modal">
      <h3>🏆 Nominate for Hall of Fame</h3>
      <p id="nominateVideoTitle" class="modal-video-title"></p>
      <p class="modal-label">Choose a category:</p>
      <div class="modal-categories">
        <button class="cat-btn" data-cat="meme-year">👑 Meme of the Year</button>
        <button class="cat-btn" data-cat="meme-month">🏆 Meme of the Month</button>
        <button class="cat-btn" data-cat="most-chaotic">🌪️ Most Chaotic</button>
        <button class="cat-btn" data-cat="most-crazy">🤯 Most Crazy</button>
        <button class="cat-btn" data-cat="funniest">😂 Funniest Video</button>
        <button class="cat-btn" data-cat="most-underrated">🏅 Most Underrated</button>
      </div>
      <button id="modalClose" class="modal-close">Cancel</button>
    </div>
  </div>

  <!-- For You Section -->
  <div id="forYouSection" class="hidden">
    <div class="for-you-header">
      <h2>✨ For You</h2>
      <p class="feed-count" id="forYouCount"></p>
    </div>
    <div id="forYouFeed" class="video-grid"></div>
  </div>

  <!-- Feed -->
  <main>
    <div class="feed-header">
      <h2 id="feedTitle">All Videos</h2>
      <p id="feedCount" class="feed-count"></p>
    </div>
    <div id="videoFeed" class="video-grid">
      <div class="loading-state">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
    <p id="emptyState" class="empty-state hidden">No videos found. Be the first to upload!</p>
  </main>

  <script type="module" src="theme.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
